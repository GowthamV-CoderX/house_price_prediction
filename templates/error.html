<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EstateIQ | Validation Error</title>


    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


</head>



<body>



<div class="background-glow"></div>



<main class="app-container">



<section class="prediction-card error-card">



    <div class="error-icon">

        ⚠️

    </div>



    <h1>

        Prediction Failed

    </h1>



    <p class="error-message">

        We couldn't generate the property valuation.
        Please review the following details and try again.

    </p>





    <div class="error-list">


        <h3>

            Please fix these issues:

        </h3>



        <ul>


        {% for error in errors %}


            <li>

                {{error}}

            </li>


        {% endfor %}



        </ul>



    </div>






    <a href="/" class="back-button">


        Return to EstateIQ


    </a>





</section>





<footer>

Built with Machine Learning 🚀

</footer>



</main>



</body>


</html>
