<!DOCTYPE html>
<html>

<head>
    <title>House Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body>

<div class="container">

<h1>House Price Prediction</h1>


<form action="/predictprice" method="POST">


<label for="area">Area (sq.ft)</label>
<input
    type="number"
    id="area"
    name="area"
    placeholder="Example: 500"
    min="1"
    step="0.01"
    required
>

<label for="bedrooms">Bedrooms</label>
<input
    type="number"
    id="bedrooms"
    name="bedrooms"
    placeholder="Example: 3"
    min="1"
    step="1"
    required
>

<label for="bathrooms">Bathrooms</label>
<input
    type="number"
    id="bathrooms"
    name="bathrooms"
    placeholder="Example: 2"
    min="1"
    step="1"
    required
>

<label for="stories">Stories</label>
<input
    type="number"
    id="stories"
    name="stories"
    placeholder="Example: 2"
    min="1"
    max="4"
    step="1"
    required
>

<label for="parking">Parking Spaces</label>
<input
    type="number"
    id="parking"
    name="parking"
    placeholder="Example: 2"
    min="0"
    max="3"
    step="1"
    required
>


<label>Main Road</label>
<select name="mainroad">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Guest Room</label>
<select name="guestroom">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Basement</label>
<select name="basement">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Hot Water Heating</label>
<select name="hotwaterheating">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Air Conditioning</label>
<select name="airconditioning">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<input type="text" name="parking" placeholder="Parking" required>


<label>Preferred Area</label>
<select name="prefarea">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label for="furnishingstatus">Furnishing Status</label>
<select id="furnishingstatus" name="furnishingstatus" required>
    <option value="" selected disabled>Select Furnishing Status</option>
    <option value="furnished">Furnished</option>
    <option value="semi-furnished">Semi-Furnished</option>
    <option value="unfurnished">Unfurnished</option>
</select>


<button type="submit">
Predict Price
</button>


</form>

</div>


</body>

</html>
