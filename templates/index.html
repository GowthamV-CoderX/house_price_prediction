<!DOCTYPE html>
<html>

<head>
    <title>House Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body>

<div class="container">

<h1>House Price Prediction</h1>


<form action="/predictprice" method="POST">


<input type="text" name="area" placeholder="Area (sq ft)" required>


<input type="text" name="bedrooms" placeholder="Bedrooms" required>


<input type="text" name="bathrooms" placeholder="Bathrooms" required>


<input type="text" name="stories" placeholder="Stories" required>


<label>Main Road</label>
<select name="mainroad">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Guest Room</label>
<select name="guestroom">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Basement</label>
<select name="basement">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Hot Water Heating</label>
<select name="hotwaterheating">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Air Conditioning</label>
<select name="airconditioning">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<input type="text" name="parking" placeholder="Parking" required>


<label>Preferred Area</label>
<select name="prefarea">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Furnished</label>
<select name="furnished">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<label>Unfurnished</label>
<select name="unfurnished">
<option value="1">Yes</option>
<option value="0">No</option>
</select>


<button type="submit">
Predict Price
</button>


</form>

</div>


</body>

</html>
